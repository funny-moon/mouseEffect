<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마우스 이펙트</title>

    <link rel="stylesheet" href="css/font.css" />
    <link rel="stylesheet" href="css/mouse.css" />

    <style>
      /* mouseType */
      .mouse__wrap {
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        color: #fff;
        overflow: hidden;
        cursor: none;
      }
      .mouse__wrap p {
        font-size: 2vw;
        line-height: 2;
        font-weight: 300;
      }
      .mouse__wrap p:last-child {
        font-size: 3vw;
        font-weight: 300;
      }
      .mouse__wrap p span {
        border-bottom: 0.15vw dashed orange;
        color: orange;
      }
      @media (max-width: 800px) {
        .mouse__wrap p {
          padding: 0 20px;
          font-size: 24px;
          line-height: 1.5;
          text-align: center;
          margin-bottom: 10px;
        }
        .mouse__wrap p:last-child {
          font-size: 40px;
          line-height: 1.5;
          text-align: center;
          word-break: keep-all;
        }
      }
      .mouse__cursor {
        position: absolute;
        left: 0;
        top: 0;
        width: 10px;
        height: 10px;
        z-index: 9999;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        user-select: none;
        pointer-events: none;
        transition:
          transform 0.3s,
          opactiy 0.3s;
      }
      .mouse__cursor2 {
        position: absolute;
        left: 0;
        top: 0;
        width: 30px;
        height: 30px;
        z-index: 9998;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.5);
        user-select: none;
        pointer-events: none;
        transition:
          transform 0.3s,
          opactiy 0.3s;
      }
      .mouse__cursor3 {
        position: absolute;
        left: 0;
        top: 0;
        width: 50px;
        height: 50px;
        z-index: 9998;
        border-radius: 50%;
        background: rgba(172, 224, 29, 0.575);
        user-select: none;
        pointer-events: none;
        transition:
          transform 0.3s,
          opactiy 0.3s;
      }
      .mouse__cursor.active {
        transform: scale(0);
      }
      .mouse__cursor2.active {
        transform: scale(5);
        background: rgba(255, 166, 0, 0.6);
      }
      .mouse__cursor3.active {
        transform: scale(6);
        background: rgba(89, 4, 199, 0.6);
      }

      .mouse__cursor.active2 {
        transform: scale(2);
      }
      .mouse__cursor2.active2 {
        transform: scale(5);
        background: rgba(0, 255, 115, 0.5);
      }
      .mouse__cursor3.active2 {
        transform: scale(6);
        background: rgba(255, 187, 0, 0.2);
      }

      .mouse__cursor.active3 {
        transform: scale(6);
        background: rgba(0, 4, 255, 1);
      }
      .mouse__cursor2.active3 {
        transform: scale(5);
        background: rgba(0, 4, 255, 0.6);
      }
      .mouse__cursor3.active3 {
        transform: scale(4);
        background: rgba(255, 0, 255, 0.3);
      }

      .mouse__cursor.active4 {
        transform: scale(2);
        background: rgb(1, 248, 96);
      }
      .mouse__cursor2.active4 {
        transform: scale(3);
        background: rgba(255, 23, 81, 0.6);
      }
      .mouse__cursor3.active4 {
        transform: scale(4);
        background: rgba(2, 120, 255, 0.3);
      }
      .mouse__info {
        position: absolute;
        left: 20px;
        bottom: 10px;
        font-size: 14px;
        line-height: 1.6;
        color: #fff;
      }
    </style>
  </head>
  <body class="img07 bg01">
    <header id="header">
      <h1><a href="#">jQuery Mouse Effect02</a></h1>
      <p>마우스 이펙트 - 마우스 따라다니기(GSAP)</p>
    </header>
    <!-- //header -->
    <main id="main">
      <section id="mouseType">
        <div class="mouse__cursor"></div>
        <div class="mouse__cursor2"></div>
        <div class="mouse__cursor3"></div>
        <div class="mouse__wrap">
          <p>when money speaks, ther <span>truth</span> keeps silent</p>
          <p>돈이 말할 때는 <span>진실</span>은 입을 다문다.</p>
        </div>
      </section>
      <div class="mouse__info">
        <ul>
          <li>pageX : <span class="pageX">0</span>px</li>
          <li>pageY : <span class="pageY">0</span>px</li>
        </ul>
      </div>
    </main>
    <!-- //main -->

    <footer id="footer">
      <div class="footer__btn">열공합시다!</div>
    </footer>
    <!-- //footer -->

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>

    <!-- <script src="js/mEffect02-JQ.js"></script> -->
    <script src="js/mEffect02-JS.js"></script>
  </body>
</html>
