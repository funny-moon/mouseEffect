<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마우스 이펙트</title>
    <link rel="stylesheet" href="css/font.css" />
    <link rel="stylesheet" href="css/mouse.css" />

    <style>
      /* mouseType */
      .mouse__wrap {
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        color: #fff;
        overflow: hidden;
        /* cursor: none; */
      }

      .mouse__wrap p {
        font-size: 2vw;
        line-height: 2;
        font-weight: 300;
      }
      .mouse__wrap p:last-child {
        font-size: 3vw;
        font-weight: 300;
      }
      .mouse__wrap p span {
        border-bottom: 0.15vw dashed orange;
        color: orange;
      }
      @media (max-width: 800px) {
        .mouse__wrap p {
          padding: 0 20px;
          font-size: 24px;
          line-height: 1.5;
          text-align: center;
          margin-bottom: 10px;
        }
        .mouse__wrap p:last-child {
          font-size: 40px;
          line-height: 1.5;
          text-align: center;
          word-break: keep-all;
        }
      }
      .mouse__cursor {
        position: absolute;
        left: 0;
        top: 0;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        border: 5px solid #fff;
        background-image: url(img/bg02.jpg);
        background-attachment: fixed;
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        z-index: -1;
      }

      .mouse__info {
        position: absolute;
        left: 20px;
        bottom: 10px;
        font-size: 14px;
        line-height: 1.6;
        color: #fff;
      }
    </style>
  </head>
  <body class="img02 bg01">
    <header id="header">
      <h1><a href="#">Javascript Mouse Effect03</a></h1>
      <p>마우스 이펙트</p>
    </header>
    <!-- //header -->
    <main id="main">
      <section id="mouseType">
        <div class="mouse__cursor"></div>
        <div class="mouse__wrap">
          <p>time fades, but the <span>feeling</span> stays</p>
          <p>what you feel becomes your <span>story</span></p>
        </div>
      </section>
      <div class="mouse__info">
        <ul>
          <li>pageX : <span class="pageX">0</span>px</li>
          <li>pageY : <span class="pageY">0</span>px</li>
        </ul>
      </div>
    </main>
    <!-- //main -->

    <footer id="footer">
      <div class="footer__btn">열공합시다!</div>
    </footer>
    <!-- //footer -->

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>

    <!-- <script src="js/mEffect04-JQ.js"></script> -->
    <script src="js/mEffect04-JS.js"></script>
  </body>
</html>
