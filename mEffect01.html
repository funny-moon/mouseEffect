<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/font.css" />
    <link rel="stylesheet" href="css/mouse.css" />
    <style>
      /* mouseType */
      .mouse__wrap {
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        color: #fff;
        overflow: hidden;
        /* cursor: none; */
      }
      .mouse__wrap p {
        font-size: 2vw;
        line-height: 2;
        font-weight: 300;
      }
      .mouse__wrap p:last-child {
        font-size: 3vw;
        font-weight: 300;
      }
      .mouse__wrap p span {
        border-bottom: 0.15vw solid #dfb21e;
        color: #dfb21e;
      }
      @media (max-width: 800px) {
        .mouse__wrap p {
          padding: 0 20px;
          font-size: 24px;
          line-height: 1.5;
          text-align: center;
          margin-bottom: 10px;
        }
        .mouse__wrap p:last-child {
          font-size: 40px;
          line-height: 1.5;
          text-align: center;
          word-break: keep-all;
        }
      }
      .mouse__cursor {
        position: absolute;
        left: 0;
        top: 0;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: 3px solid #fff;
        background-color: rgba(255, 255, 255, 0.1);
        user-select: none;
        pointer-events: none;
        /* perspective: 400px;
       transform-style: preserve-3d; */
        transition:
          background-color 0.3s,
          border-color 0.3s,
          transform 0.6s,
          border-radius 0.3s;
      }
      .mouse__cursor.style1 {
        background-color: rgba(255, 165, 0, 0.4);
        border-color: orange;
      }
      .mouse__cursor.style2 {
        background-color: rgba(140, 0, 255, 0.4);
        border-color: rgb(140, 0, 255);
        transform: scale(2) rotateY(720deg);
      }
      .mouse__cursor.style3 {
        background-color: rgb(0, 47, 255, 0.4);
        border-color: rgb(0, 47, 255);
        transform: scale(1.5) rotateX(545deg);
      }
      .mouse__cursor.style4 {
        background-color: rgb(0, 47, 255, 0.4);
        border-color: rgb(0, 47, 255);
        transform: scale(10);
      }
      .mouse__cursor.style5 {
        background-color: rgb(255, 0, 85, 0.4);
        border-color: rgb(255, 0, 85);
        transform: scale(0.1);
      }
      .mouse__cursor.style6 {
        background-color: rgb(255, 81, 0, 0.4);
        border-color: rgb(255, 81, 0);
        border-radius: 0;
        transform: scale(5) skew(40deg);
      }
      .mouse__info {
        position: absolute;
        left: 20px;
        bottom: 10px;
        font-size: 14px;
        line-height: 1.6;
        color: #fff;
      }
    </style>
  </head>
  <body class="img01 bg01">
    <header id="header">
      <h1><a href="mouseEffect.html">Mouse Effect01</a></h1>
      <p>마우스 이펙트 - 마우스 따라다니기</p>
    </header>
    <!-- //header -->

    <main id="main">
      <section id="mouseType">
        <div class="mouse__cursor"></div>
        <div class="mouse__wrap">
          <p>
            <span class="style1">Breathe</span> in the <span class="style2">moment</span> and let your mind
            <span class="style3">rest</span>
          </p>
          <p>
            <span class="style4">Peace</span> comes with <span class="style5">time</span> and
            <span class="style6">stillness</span>
          </p>
        </div>
      </section>

      <div class="mouse__info">
        <ul>
          <li>clientX : <span class="clientX">0</span>px</li>
          <li>clientY : <span class="clientY">0</span>px</li>
          <li>offsetX : <span class="offsetX">0</span>px</li>
          <li>offsetY : <span class="offsetY">0</span>px</li>
          <li>pageX : <span class="pageX">0</span>px</li>
          <li>pageY : <span class="pageY">0</span>px</li>
          <li>screenX : <span class="screenX">0</span>px</li>
          <li>screenY : <span class="screenY">0</span>px</li>
        </ul>
      </div>
    </main>
    <!-- //main -->

    <footer id="footer">
      <div class="footer__btn">열공합시다!</div>
    </footer>
    <!-- //footer -->

    <script src="js/mEffect01-JS.js"></script>
  </body>
</html>
