<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마우스 이펙트</title>
    <link rel="stylesheet" href="css/font.css" />
    <link rel="stylesheet" href="css/mouse.css" />

    <style>
      /* mouseType */
      .mouse__wrap {
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        color: #fff;
        overflow: hidden;
      }

      .mouse__wrap figure {
        width: 50vw;
        height: 50vh;
        position: relative;
        overflow: hidden;
        transition: transform 500ms ease;
        /* cursor: none; */
      }

      .mouse__wrap figure:hover {
        transform: scale(1.025);
      }

      .mouse__wrap figure img {
        position: absolute;
        left: -5%;
        top: -5%;
        width: 110%;
        height: 110%;
        object-fit: cover;
      }

      .mouse__wrap figure figcaption {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        font-size: 16px;
        white-space: nowrap;
        line-height: 1.4;
        font-weight: 300;
      }

      .mouse__cursor {
        position: absolute;
        left: 0;
        top: 0;
        width: 20px;
        height: 20px;
        background: #fff;
        border-radius: 50%;
        z-index: 1000;
        user-select: none;
        pointer-events: none;
      }

      .mouse__info {
        position: absolute;
        left: 20px;
        bottom: 10px;
        font-size: 14px;
        line-height: 1.6;
        color: #fff;
      }
    </style>
  </head>
  <body class="img05 bg01">
    <header id="header">
      <h1><a href="#">Javascript Mouse Effect03</a></h1>
      <p>마우스 이펙트 - 이미지 효과</p>
    </header>
    <!-- //header -->
    <main id="main">
      <section id="mouseType">
        <div class="mouse__cursor"></div>
        <div class="mouse__wrap">
          <figure>
            <img src="img/bg05.jpg" alt="이미지" />
            <figcaption>
              <p>time moves quietly, carrying moments we never notice at first</p>
              <p>but one day, those moments become the memories we hold onto the most</p>
            </figcaption>
          </figure>
        </div>
      </section>

      <div class="mouse__info">
        <ul>
          <li>mousePageX : <span class="mousePageX">0</span>px</li>
          <li>mousePageY : <span class="mousePageY">0</span>px</li>
          <li>centerPageX : <span class="centerPageX">0</span>px</li>
          <li>centerPageY : <span class="centerPageY">0</span>px</li>
        </ul>
      </div>
    </main>
    <!-- //main -->

    <footer id="footer">
      <div class="footer__btn">열공합시다!</div>
    </footer>
    <!-- //footer -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>

    <!-- <script src="js/mEffect05-JQ.js"></script> -->
    <script src="js/mEffect05-JS.js"></script>
  </body>
</html>
